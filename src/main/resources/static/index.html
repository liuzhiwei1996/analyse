<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>稳健短线策略系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f6f8fb;
            color: #1f2937;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            padding: 32px 0;
        }
        .container { max-width: 1080px; }
        .hero {
            background: linear-gradient(135deg, #0f172a, #2563eb);
            border-radius: 18px;
            color: #fff;
            padding: 34px;
            margin-bottom: 26px;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            margin-bottom: 22px;
        }
        .result-box {
            background: #0f172a;
            color: #dbeafe;
            border-radius: 12px;
            min-height: 88px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            padding: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
            <h1 class="h2 mb-3">稳健短线策略系统</h1>
            <div class="opacity-75">保留基础数据导入能力，新策略按市场环境、硬过滤、性价比排序和影子盘验证运行。</div>
        </div>
        <a class="btn btn-light btn-lg" href="/strategy-dashboard.html">进入策略仪表板</a>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">日K数据导入</h2>
                    <div class="mb-3">
                        <label class="form-label">股票代码</label>
                        <input id="dailyStockCode" class="form-control" placeholder="ALL 或 600000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">交易日期</label>
                        <input id="dailyTradeDate" type="date" class="form-control">
                    </div>
                    <button class="btn btn-primary w-100" onclick="importDailyData()">导入日K</button>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">分时数据导入</h2>
                    <div class="mb-3">
                        <label class="form-label">股票代码</label>
                        <input id="minuteStockCode" class="form-control" placeholder="600000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">交易日期</label>
                        <input id="minuteTradeDate" type="date" class="form-control">
                    </div>
                    <button class="btn btn-outline-primary w-100" onclick="importMinuteData()">导入分时</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">数据缺失检查</h2>
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">股票代码</label>
                    <input id="missingStockCode" class="form-control" placeholder="可选">
                </div>
                <div class="col-md-3">
                    <label class="form-label">开始日期</label>
                    <input id="missingStartDate" type="date" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">结束日期</label>
                    <input id="missingEndDate" type="date" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-secondary w-100" onclick="checkMissingData()">检查</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">执行结果</h2>
            <div id="resultBox" class="result-box">等待操作。</div>
        </div>
    </div>
</div>

<script>
    function setResult(data) {
        document.getElementById('resultBox').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    function stockPayload(stockCodeId, tradeDateId) {
        return {
            stockCode: document.getElementById(stockCodeId).value || null,
            tradeDate: document.getElementById(tradeDateId).value || null
        };
    }

    async function postJson(url, body) {
        setResult('处理中...');
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        setResult(await response.json());
    }

    function importDailyData() {
        postJson('/anlysis/importStockDailyData', stockPayload('dailyStockCode', 'dailyTradeDate')).catch(error => setResult(error.message));
    }

    function importMinuteData() {
        postJson('/anlysis/importStockMinuteData', stockPayload('minuteStockCode', 'minuteTradeDate')).catch(error => setResult(error.message));
    }

    async function checkMissingData() {
        const params = new URLSearchParams();
        const stockCode = document.getElementById('missingStockCode').value;
        const startDate = document.getElementById('missingStartDate').value;
        const endDate = document.getElementById('missingEndDate').value;
        if (stockCode) params.append('stockCode', stockCode);
        params.append('startDate', startDate);
        params.append('endDate', endDate);
        setResult('处理中...');
        try {
            const response = await fetch('/anlysis/checkMissingData?' + params.toString(), { method: 'POST' });
            setResult(await response.json());
        } catch (error) {
            setResult(error.message);
        }
    }
</script>
</body>
</html>
